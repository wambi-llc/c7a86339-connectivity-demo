    #cy { width: 100vw; height: 100vh; transition: width 0.2s; }
    body.sidebar-open #cy { width: calc(100vw - 360px); }

    #header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 10;
      background: rgba(250,251,253,0.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid #e6e9ee; padding: 10px 20px;
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      transition: transform 0.3s;
    }
    body.chrome-hidden #header { transform: translateY(-100%); }
    body.chrome-hidden #controls { transform: translateY(-200%); }
    #header h1 { font-size: 15px; font-weight: 600; color: #282C58; }
    .tag { font-size: 11px; padding: 2px 10px; border-radius: 12px; font-weight: 500; display: inline-block; }
    .t-info { background: #F2F0FF; color: #4C34EB; border: 1px solid #B1A6F7; }
    .t-pass { background: #EAFFEE; color: #00A822; border: 1px solid #00A822; }
    .t-warn { background: #FCF3DD; color: #FE8B0A; border: 1px solid #FFBB07; }
    .t-fail { background: #FFEBF0; color: #DB001D; border: 1px solid #DB001D; }

    #controls {
      position: fixed; top: 46px; left: 0; right: 0; z-index: 9;
      background: rgba(250,251,253,0.92); border-bottom: 1px solid #e6e9ee;
      padding: 8px 20px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
      font-size: 12px; transition: transform 0.3s;
    }
    #controls label { color: #41454D; font-weight: 500; }
    #controls select, #controls input[type="range"] { background: #fff; color: #03001A; border: 1px solid #ccd0d7; border-radius: 4px; padding: 3px 8px; font-size: 11px; }
    #controls .range-val { color: #4C34EB; font-weight: 600; min-width: 24px; display: inline-block; }
    #controls button {
      background: #f2f4f7; color: #41454D; border: 1px solid #ccd0d7; border-radius: 4px;
      padding: 4px 12px; font-size: 11px; cursor: pointer; font-weight: 500;
    }
    #controls button:hover { background: #e6e9ee; }
    #controls button.active { background: #4C34EB; border-color: #664DFF; color: #fff; }

    #sidebar {
      position: fixed; top: 0; right: 0; bottom: 0; width: 360px; z-index: 20;
      background: #fff; border-left: 1px solid #e6e9ee;
      box-shadow: -4px 0 20px rgba(40,44,89,0.08);
      transform: translateX(100%); transition: transform 0.2s;
      overflow-y: auto; font-size: 13px; padding: 16px;
    }
    body.sidebar-open #sidebar { transform: translateX(0); }
    #sidebar h2 { font-size: 15px; font-weight: 600; margin-bottom: 12px; color: #282C58; }
    #sidebar .close { position: absolute; top: 12px; right: 14px; cursor: pointer; font-size: 18px; color: #787c83; }
    #sidebar .close:hover { color: #282C58; }
    #sidebar .row { margin: 5px 0; display: flex; gap: 6px; }
    #sidebar .lbl { color: #4C34EB; font-weight: 600; min-width: 100px; font-size: 12px; }
    #sidebar .val { color: #41454D; font-size: 12px; word-break: break-word; }
    #sidebar hr { border: none; border-top: 1px solid #e6e9ee; margin: 10px 0; }
    #sidebar .bar-container { height: 6px; background: #e6e9ee; border-radius: 3px; margin-top: 4px; overflow: hidden; }
    #sidebar .bar-fill { height: 100%; border-radius: 3px; }
    #sidebar .conn-list { margin: 6px 0; max-height: 200px; overflow-y: auto; }
    #sidebar .conn-item { padding: 4px 8px; border-radius: 4px; margin: 2px 0; font-size: 11px; display: flex; justify-content: space-between; }
    #sidebar .conn-item:hover { background: #f2f4f7; cursor: pointer; }
    #sidebar .conn-badge { background: #4C34EB; color: #fff; border-radius: 8px; padding: 1px 6px; font-size: 10px; font-weight: 600; }
    #sidebar .conn-badge.cross { background: #FF7755; }

    #legend {
      position: fixed; bottom: 16px; left: 16px; z-index: 10;
      background: rgba(255,255,255,0.95); border: 1px solid #e6e9ee;
      border-radius: 8px; padding: 12px 16px; font-size: 11px;
      box-shadow: 0 2px 12px rgba(40,44,89,0.06);
    }
    .leg { display: flex; align-items: center; gap: 6px; margin: 3px 0; color: #41454D; }
    .ldot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .ledge { width: 20px; height: 0; display: inline-block; margin-right: -4px; }

    #stats-panel {
      position: fixed; bottom: 16px; right: 16px; z-index: 10;
      background: rgba(255,255,255,0.95); border: 1px solid #e6e9ee;
      border-radius: 8px; padding: 12px 16px; font-size: 11px;
      box-shadow: 0 2px 12px rgba(40,44,89,0.06); min-width: 180px;
      transition: right 0.2s;
    }
    body.sidebar-open #stats-panel { right: 376px; }
    #stats-panel .stat-row { display: flex; justify-content: space-between; margin: 3px 0; }
    #stats-panel .stat-label { color: #41454D; }
    #stats-panel .stat-value { color: #4C34EB; font-weight: 600; }

    .highlight-ring { }
    .ghost-count { font-size: 11px; color: #DB001D; margin-left: 6px; font-weight: 600; }
    @keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 rgba(76,52,235,0.3); } 70% { box-shadow: 0 0 0 12px rgba(76,52,235,0); } 100% { box-shadow: 0 0 0 0 rgba(76,52,235,0); } }
  </style>

const r = (v, d = 2) => { const n = Number(v); return Number.isFinite(n) ? +(n.toFixed(d)) : v; }

// Ghost avatar generator (lightweight, client-side only)
const ghostAvatar = (id) => {
  let s = Math.abs(id) || 1;
  const rng = () => { s = (s * 16807) % 2147483647; return (s - 1) / 2147483646; };
  const bg = ['#475569','#4b5563','#525252','#57534e'][Math.floor(rng() * 4)];
  const ey = 39 + Math.floor(rng() * 3);
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">` +
    `<circle cx="50" cy="50" r="50" fill="${bg}"/>` +
    `<circle cx="38" cy="${ey}" r="3" fill="#1e293b" opacity="0.3"/>` +
    `<circle cx="62" cy="${ey}" r="3" fill="#1e293b" opacity="0.3"/>` +
    `<line x1="42" y1="60" x2="58" y2="60" stroke="#1e293b" stroke-width="2" opacity="0.2" stroke-linecap="round"/></svg>`;
  return 'data:image/svg+xml;utf8,' + encodeURIComponent(svg);
};

function onGroupTypeChange(gtId) {
  const groupSelect = document.getElementById('group-select');
  if (gtId === 'all') {
    groupSelect.innerHTML = '<option value="all">-- select group --</option>';
    scopeToGroup(null);
    return;
  }
  const gt = DATA.groupIndex.find(g => g.id === parseInt(gtId));
  if (!gt) return;
  groupSelect.innerHTML = '<option value="all">All ' + gt.name + 's (' + gt.groups.length + ')</option>' +
    gt.groups.map(g => `<option value="${g.id}">${g.name} (${g.members})</option>`).join('');
  scopeToGroupType(parseInt(gtId));
}

function onGroupChange(groupId) {
  if (groupId === 'all') {
    const gtId = document.getElementById('gt-select').value;
    if (gtId !== 'all') scopeToGroupType(parseInt(gtId));
    else scopeToGroup(null);
    return;
  }
  scopeToGroup(parseInt(groupId));
}

function removeGhosts() {
  cy.nodes('.ghost').remove();
}

function scopeToGroup(groupId) {
  removeGhosts();
  cy.elements().removeClass('faded');
  if (!groupId) {
    cy.nodes().show(); cy.edges().show();
    document.getElementById('scope-info').textContent = 'Showing all ' + DATA.nodes.length + ' people';
    updateStats(cy.nodes(), cy.edges());
    reLayout();
    return;
  }
  // Show only people in this group + their direct connections
  const inGroup = cy.nodes().filter(n => {
    const nodeData = DATA.nodes.find(dn => dn.id === n.data('pid'));
    return nodeData && nodeData.groups.some(g => g.id === groupId);
  });
  const neighborhood = inGroup.closedNeighborhood();
  cy.elements().addClass('faded');
  neighborhood.removeClass('faded');
  inGroup.style('border-width', 4);
  neighborhood.nodes().not(inGroup).style('border-width', 2);

  // Ghost nodes: group members with zero recognition activity
  const ghosts = DATA.ghosts[groupId] || [];
  if (ghosts.length > 0 && inGroup.length > 0) {
    // Find centroid of connected members
    const bb = inGroup.boundingBox();
    const cx = (bb.x1 + bb.x2) / 2;
    const cy_ = (bb.y1 + bb.y2) / 2;
    const radius = Math.max(bb.w, bb.h) / 2 + 120;

    const ghostNodes = ghosts.map((g, i) => {
      const angle = (2 * Math.PI * i) / ghosts.length;
      return {
        group: 'nodes',
        data: {
          id: 'ghost-' + g.id,
          label: g.name.split(' ')[0] + (g.name.split(' ')[1] ? ' ' + g.name.split(' ')[1][0] + '.' : ''),
          fullName: g.name,
          jobTitle: g.jobTitle,
          avatar: ghostAvatar(g.id),
          pid: g.id,
          isGhost: true,
        },
        position: { x: cx + radius * Math.cos(angle), y: cy_ + radius * Math.sin(angle) },
        classes: 'ghost',
      };
    });
    cy.add(ghostNodes);
  }

  const groupName = DATA.groupIndex.flatMap(gt => gt.groups).find(g => g.id === groupId)?.name || 'Group';
  const ghostCount = ghosts.length;
  let info = groupName + ': ' + inGroup.length + ' active, ' + neighborhood.edges().length + ' connections';
  if (ghostCount > 0) info += ' | ' + ghostCount + ' disengaged';
  document.getElementById('scope-info').innerHTML = info + (ghostCount > 0 ? ' <span class="ghost-count">(' + Math.round(ghostCount / (inGroup.length + ghostCount) * 100) + '% invisible)</span>' : '');
  updateStats(neighborhood.nodes(), neighborhood.edges());

  const fitEles = ghostCount > 0 ? cy.nodes().not('.faded') : neighborhood;
  if (inGroup.length > 0) cy.animate({ fit: { eles: fitEles, padding: 60 } }, { duration: 500 });
}

function scopeToGroupType(gtId) {
  removeGhosts();
  cy.elements().removeClass('faded');
  const inGt = cy.nodes().filter(n => {
    const nodeData = DATA.nodes.find(dn => dn.id === n.data('pid'));
    return nodeData && nodeData.groups.some(g => g.typeId === gtId);
  });
  const neighborhood = inGt.closedNeighborhood();
  cy.elements().addClass('faded');
  neighborhood.removeClass('faded');
  const gtName = DATA.groupIndex.find(g => g.id === gtId)?.name || 'Group Type';
  document.getElementById('scope-info').textContent = gtName + ': ' + inGt.length + ' members';
  updateStats(neighborhood.nodes(), neighborhood.edges());
  if (inGt.length > 0) cy.animate({ fit: { eles: neighborhood, padding: 60 } }, { duration: 500 });
}

function updateStats(nodes, edges) {
  const panel = document.getElementById('stats-panel');
  const visible = nodes.filter(n => n.visible()).length;
  const visEdges = edges.filter(e => e.visible()).length;
  const cross = edges.filter(e => e.visible() && e.data('crossTeam')).length;
  panel.innerHTML = `
    <div style="font-weight:600;margin-bottom:6px;color:#282C58;">Network Stats</div>
    <div class="stat-row"><span class="stat-label">Visible People</span><span class="stat-value">${visible}</span></div>
    <div class="stat-row"><span class="stat-label">Connections</span><span class="stat-value">${visEdges}</span></div>
    <div class="stat-row"><span class="stat-label">Cross-Team</span><span class="stat-value" style="color:#FF7755;">${cross}</span></div>
    <div class="stat-row"><span class="stat-label">Cross-Team %</span><span class="stat-value" style="color:#FF7755;">${visEdges ? Math.round(cross/visEdges*100) : 0}%</span></div>
  `;
}

const sortedByInfluence = [...DATA.nodes].sort((a, b) => b.influenceScore - a.influenceScore);
const crownIds = new Set(sortedByInfluence.slice(0, 5).map(n => n.id));

// ── Engagement tiers and recency for visual language ──
const allInfluence = DATA.nodes.map(n => n.influenceScore).sort((a, b) => a - b);
const p10 = allInfluence[Math.floor(allInfluence.length * 0.10)] || 0;
const p25 = allInfluence[Math.floor(allInfluence.length * 0.25)] || 0;
const p75 = allInfluence[Math.floor(allInfluence.length * 0.75)] || 0;

const now = Date.now();
const DAY = 86400000;

// Node lookup for access level (leader detection on edges)
const nodeAccessLevel = {};
DATA.nodes.forEach(n => { nodeAccessLevel[n.id] = n.accessLevel; });

// ── Build Cytoscape elements ──
const maxInfluence = Math.max(...DATA.nodes.map(n => n.influenceScore), 1);
const maxWeight = Math.max(...DATA.edges.map(e => e.weight), 1);

const cyNodes = DATA.nodes.map(n => {
  const hasCrown = crownIds.has(n.id);
  const size = 24 + (n.influenceScore / maxInfluence) * 52;

  // Engagement tier: low (<p10), cool (<p25), warm (>p75), neutral (middle)
  const tier = n.influenceScore <= p10 ? 'low' : n.influenceScore <= p25 ? 'cool' : n.influenceScore >= p75 ? 'warm' : 'neutral';

  // Opacity: scale 0.35 (lowest) to 1.0 (highest) by influence percentile
  const nodeOpacity = 0.35 + 0.65 * (n.influenceScore / maxInfluence);

  // Recently recognized: any edge with lastAt within 7 days
  const recentEdge = DATA.edges.some(e => (e.target === n.id || e.source === n.id) && e.lastAt && (now - new Date(e.lastAt).getTime()) < 7 * DAY);

  return {
    data: {
      id: 'p' + n.id,
      label: n.shortName || n.name,
      fullName: n.name,
      team: n.team,
      jobTitle: n.jobTitle,
      degree: n.degree,
      sentTo: n.sentTo,
      receivedFrom: n.receivedFrom,
      totalSent: n.totalSent,
      totalReceived: n.totalReceived,
      crossTeamEdges: n.crossTeamEdges,
      influenceScore: n.influenceScore,
      pageRank: n.pageRank,
      sendInfluence: n.sendInfluence,
      receiveInfluence: n.receiveInfluence,
      engagementBonus: n.engagementBonus || 0,
      comments: n.comments || 0,
      reactions: n.reactions || 0,
      challengesCompleted: n.challengesCompleted || 0,
      loginCount: n.loginCount || 0,
      lastLogin: n.lastLogin || null,
      nodeSize: size,
      nodeOpacity: nodeOpacity,
      teamColor: teamColors[n.team] || '#787c83',
      avatar: n.avatar,
      hasCrown: hasCrown,
      pid: n.id,
      accessLevel: n.accessLevel,
      reportsTo: n.reportsTo,
      tier: tier,
      recentlyRecognized: recentEdge,
      isLeader: n.accessLevel > 1,
    }
  };
});

const cyEdges = DATA.edges.map((e, i) => {
  const stale = e.lastAt && (now - new Date(e.lastAt).getTime()) > 60 * DAY;
  const senderLevel = nodeAccessLevel[e.source] || 1;
  const leaderEdge = senderLevel > 1;
  return {
    data: {
      id: 'e' + i,
      source: 'p' + e.source,
      target: 'p' + e.target,
      weight: e.weight,
      crossTeam: e.crossTeam,
      stale: stale,
      leaderEdge: leaderEdge,
      edgeWidth: 0.5 + (e.weight / maxWeight) * 4,
    }
  };
});

// ── Init Cytoscape ──
const cy = cytoscape({
  container: document.getElementById('cy'),
  elements: [...cyNodes, ...cyEdges],
  style: [
    {
      selector: 'node',
      style: {
        'label': 'data(label)',
        'width': 'data(nodeSize)',
        'height': 'data(nodeSize)',
        'background-color': 'data(teamColor)',
        'background-image': 'data(avatar)',
        'background-fit': 'cover',
        'background-clip': 'node',
        'background-opacity': 'data(nodeOpacity)',
        'background-image-smoothing': 'yes',
        'border-width': 3,
        'border-color': 'data(teamColor)',
        'border-opacity': 0.8,
        'opacity': 'data(nodeOpacity)',
        'font-size': '8px',
        'font-family': '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif',
        'color': '#03001A',
        'text-outline-color': '#fafbfd',
        'text-outline-width': 2,
        'text-valign': 'bottom',
        'text-margin-y': 6,
        'text-wrap': 'ellipsis',
        'text-max-width': '80px',
        'min-zoomed-font-size': 8,
      }
    },
    {
      selector: 'node[?hasCrown]',
      style: {
        'border-color': '#f59e0b',
        'border-width': 5,
        'border-opacity': 1,
      }
    },
    {
      selector: 'edge',
      style: {
        'width': 'data(edgeWidth)',
        'line-color': '#ccd0d7',
        'target-arrow-color': '#787c83',
        'target-arrow-shape': 'triangle',
        'arrow-scale': 0.5,
        'curve-style': 'bezier',
        'opacity': 0.5,
      }
    },
    {
      selector: 'edge[?crossTeam]',
      style: {
        'line-color': '#FF7755',
        'target-arrow-color': '#FF7755',
        'line-style': 'dashed',
        'opacity': 0.6,
      }
    },
    {
      selector: ':selected',
      style: {
        'border-width': 4,
        'border-color': '#f59e0b',
        'background-opacity': 1,
        'z-index': 999,
      }
    },
    {
      selector: '.dimmed',
      style: {
        'opacity': 0.1,
      }
    },
    {
      selector: '.highlighted',
      style: {
        'border-width': 4,
        'border-color': '#f59e0b',
        'background-opacity': 1,
        'z-index': 100,
      }
    },
    {
      selector: 'edge.highlighted',
      style: {
        'opacity': 0.9,
        'width': 'data(edgeWidth)',
        'z-index': 100,
      }
    },
    {
      selector: '.influencer',
      style: {
        'border-color': '#f59e0b',
        'border-width': 4,
        'background-opacity': 1,
      }
    },
    {
      selector: '.bridge',
      style: {
        'border-color': '#d97706',
        'border-width': 4,
        'background-opacity': 1,
        'shape': 'diamond',
      }
    },
    {
      selector: '.isolated-node',
      style: {
        'border-color': '#DB001D',
        'border-width': 3,
        'border-style': 'dashed',
        'background-opacity': 0.6,
      }
    },
    {
      selector: '.ghost',
      style: {
        'background-color': '#e6e9ee',
        'border-color': '#DB001D',
        'border-width': 2,
        'border-style': 'dashed',
        'border-opacity': 0.5,
        'background-opacity': 0.4,
        'background-image': 'data(avatar)',
        'background-fit': 'cover',
        'background-clip': 'node',
        'background-image-opacity': 0.3,
        'width': 22,
        'height': 22,
        'label': 'data(label)',
        'font-size': '7px',
        'color': '#787c83',
        'text-outline-color': '#fafbfd',
        'text-outline-width': 1,
        'text-valign': 'bottom',
        'text-margin-y': 5,
        'text-wrap': 'ellipsis',
        'text-max-width': '60px',
        'min-zoomed-font-size': 7,
      }
    },
    // #1 Engagement tier: low activity = dashed border
    {
      selector: 'node[tier = "low"]',
      style: {
        'border-style': 'dotted',
        'border-color': '#ccd0d7',
        'border-opacity': 0.5,
      }
    },
    {
      selector: 'node[tier = "cool"]',
      style: {
        'border-style': 'dashed',
        'border-opacity': 0.6,
      }
    },
    // #2 Recent recognition pulse (CSS animation via overlay shadow)
    {
      selector: 'node[?recentlyRecognized]',
      style: {
        'overlay-color': '#4C34EB',
        'overlay-padding': 6,
        'overlay-opacity': 0.08,
      }
    },
    // #3 Stale edges: connections gone quiet (>60 days)
    {
      selector: 'edge[?stale]',
      style: {
        'line-style': 'dotted',
        'opacity': 0.25,
        'line-color': '#ccd0d7',
        'target-arrow-color': '#ccd0d7',
      }
    },
    // #4 Leader-to-team edges: distinct color
    {
      selector: 'edge[?leaderEdge]',
      style: {
        'line-color': '#4C34EB',
        'target-arrow-color': '#4C34EB',
        'opacity': 0.45,
      }
    },
    // Cross-team overrides leader color (cross-team is more important signal)
    {
      selector: 'edge[?crossTeam][?leaderEdge]',
      style: {
        'line-color': '#FF7755',
        'target-arrow-color': '#FF7755',
        'line-style': 'dashed',
        'opacity': 0.6,
      }
    },
    {
      selector: '.faded',
      style: { 'opacity': 0.08 }
    },
  ],
  layout: { name: 'grid' },  // placeholder, we run layout after init
  minZoom: 0.1,
  maxZoom: 4,
  wheelSensitivity: 0.3,
});

// Run layout after init
const hasFcose = cy.layout({ name: 'fcose' }).options != null && typeof cytoscapeFcose !== 'undefined';
const layoutOpts = hasFcose ? {
  name: 'fcose',
  animate: true,
  animationDuration: 800,
  quality: 'default',
  nodeDimensionsIncludeLabels: true,
  nodeSeparation: 250,
  idealEdgeLength: node => {
    // bigger nodes get longer edges so they push outward
    const avgSize = (node.source().data('nodeSize') + node.target().data('nodeSize')) / 2;
    return 120 + avgSize * 2;
  },
  nodeRepulsion: node => {
    // repulsion scales with node area (r^2 growth)
    const size = node.data('nodeSize') || 30;
    return 20000 + size * size * 30;
  },
  edgeElasticity: 0.1,
  gravity: 0.04,
  gravityRange: 10,
  numIter: 5000,
  randomize: true,
  padding: 120,
} : {
  name: 'cose',
  animate: true,
  animationDuration: 800,
  nodeOverlap: 80,
  idealEdgeLength: 200,
  nodeRepulsion: function(){ return 50000; },
  edgeElasticity: function(){ return 50; },
  gravity: 0.05,
  numIter: 3000,
  randomize: true,
  padding: 100,
};

console.log('Using layout:', layoutOpts.name);
cy.layout(layoutOpts).run();

updateStats(cy.nodes(), cy.edges());

// ── Interaction ──
cy.on('tap', 'node', function(evt) {
  const node = evt.target;
  if (node.data('isGhost')) { showGhostSidebar(node); return; }
  showSidebar(node);
});

cy.on('tap', function(evt) {
  if (evt.target === cy) closeSidebar();
});

function showSidebar(node) {
  const d = node.data();
  const sb = document.getElementById('sidebar');

  // Find connections
  const connEdges = node.connectedEdges().filter(e => e.visible());
  const sent = connEdges.filter(e => e.source().id() === node.id());
  const received = connEdges.filter(e => e.target().id() === node.id());

  const sentList = sent.map(e => {
    const tgt = e.target();
    return { nodeId: tgt.id(), name: tgt.data('label'), team: tgt.data('team'), weight: e.data('weight'), cross: e.data('crossTeam') };
  }).sort((a, b) => b.weight - a.weight);

  const recvList = received.map(e => {
    const src = e.source();
    return { nodeId: src.id(), name: src.data('label'), team: src.data('team'), weight: e.data('weight'), cross: e.data('crossTeam') };
  }).sort((a, b) => b.weight - a.weight);

  const maxInf = Math.max(...DATA.nodes.map(n => n.influenceScore), 1);
  const infPct = Math.round((d.influenceScore / maxInf) * 100);
  const allScores = DATA.nodes.map(n => n.influenceScore).sort((a,b) => a - b);
  const rank = allScores.filter(s => s < d.influenceScore).length;
  const percentile = Math.round((rank / allScores.length) * 100);

  sb.innerHTML = `
    <span class="close" onclick="closeSidebar()">&times;</span>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px;">
      <img src="${d.avatar}" style="width:56px;height:56px;border-radius:50%;border:3px solid ${d.teamColor};background:#f2f4f7;object-fit:cover;object-position:center;display:block;" />
      <div>
        <h2 style="margin-bottom:2px;">${d.fullName || d.label}${d.hasCrown ? ' <span style="font-size:16px;">👑</span>' : ''}</h2>
        <div style="font-size:11px;color:#5E636B;">${d.jobTitle || 'N/A'}</div>
      </div>
    </div>
    <div class="row"><span class="lbl">Team</span><span class="val" style="color:${d.teamColor}">${d.team}</span></div>
    <div class="row"><span class="lbl">People ID</span><span class="val">${d.pid}</span></div>
    <div class="row"><span class="lbl">Access Level</span><span class="val">${d.accessLevel}</span></div>
    <hr>
    <div style="font-weight:600;color:#282C58;margin-bottom:6px;">Influence Score: ${r(d.influenceScore)} <span style="color:#5E636B;font-weight:400;font-size:11px;">(top ${100 - percentile}%)</span></div>
    <div class="bar-container"><div class="bar-fill" style="width:${infPct}%;background:linear-gradient(90deg, ${d.teamColor}, #f59e0b);"></div></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px;">
      <div style="background:#f2f4f7;border-radius:6px;padding:8px;text-align:center;">
        <div style="font-size:18px;font-weight:700;color:#282C58;">${r(d.sendInfluence)}</div>
        <div style="font-size:10px;color:#5E636B;">Send Influence</div>
        <div style="font-size:10px;color:#787c83;">${r(d.totalSent)} sent, 1.5x cross-team</div>
      </div>
      <div style="background:#f2f4f7;border-radius:6px;padding:8px;text-align:center;">
        <div style="font-size:18px;font-weight:700;color:#282C58;">${r(d.receiveInfluence)}</div>
        <div style="font-size:10px;color:#5E636B;">Receive Influence</div>
        <div style="font-size:10px;color:#787c83;">${r(d.totalReceived)} received, rank-weighted</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px;">
      <div style="background:#f2f4f7;border-radius:6px;padding:8px;text-align:center;">
        <div style="font-size:18px;font-weight:700;color:#345BFF;">${r(d.pageRank)}</div>
        <div style="font-size:10px;color:#5E636B;">PageRank</div>
        <div style="font-size:10px;color:#787c83;">Cascade influence</div>
      </div>
      <div style="background:#f2f4f7;border-radius:6px;padding:8px;text-align:center;">
        <div style="font-size:18px;font-weight:700;color:#FF7755;">${d.crossTeamEdges}</div>
        <div style="font-size:10px;color:#5E636B;">Cross-Team</div>
        <div style="font-size:10px;color:#787c83;">Bridge connections</div>
      </div>
    </div>
    <hr>
    <div style="font-weight:600;color:#282C58;margin-bottom:6px;">Engagement</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;">
      <div style="background:#f2f4f7;border-radius:6px;padding:6px;text-align:center;">
        <div style="font-size:16px;font-weight:700;color:#282C58;">${d.comments}</div>
        <div style="font-size:9px;color:#5E636B;">Comments</div>
      </div>
      <div style="background:#f2f4f7;border-radius:6px;padding:6px;text-align:center;">
        <div style="font-size:16px;font-weight:700;color:#282C58;">${d.reactions}</div>
        <div style="font-size:9px;color:#5E636B;">Reactions</div>
      </div>
      <div style="background:#f2f4f7;border-radius:6px;padding:6px;text-align:center;">
        <div style="font-size:16px;font-weight:700;color:#282C58;">${d.challengesCompleted}</div>
        <div style="font-size:9px;color:#5E636B;">Challenges</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px;">
      <div class="row"><span class="lbl">Logins</span><span class="val">${d.loginCount || 'N/A'}</span></div>
      <div class="row"><span class="lbl">Last Login</span><span class="val">${d.lastLogin ? new Date(d.lastLogin).toLocaleDateString() : 'N/A'}</span></div>
    </div>
    <div class="row" style="margin-top:4px;"><span class="lbl">Connections</span><span class="val">${d.degree} (${d.sentTo} out, ${d.receivedFrom} in)</span></div>
    <hr>
    <h2>Sent Recognition (${sentList.length})</h2>
    <div class="conn-list">
      ${sentList.map(c => `
        <div class="conn-item" style="cursor:pointer;" onclick="focusNode('${c.nodeId}')">
          <span>${c.name} <span style="color:#787c83;font-size:10px;">${c.team}</span></span>
          <span class="conn-badge ${c.cross ? 'cross' : ''}">${r(c.weight)}</span>
        </div>
      `).join('')}
      ${sentList.length === 0 ? '<div style="color:#787c83;padding:4px 8px;">None in view</div>' : ''}
    </div>
    <hr>
    <h2>Received Recognition (${recvList.length})</h2>
    <div class="conn-list">
      ${recvList.map(c => `
        <div class="conn-item" style="cursor:pointer;" onclick="focusNode('${c.nodeId}')">
          <span>${c.name} <span style="color:#787c83;font-size:10px;">${c.team}</span></span>
          <span class="conn-badge ${c.cross ? 'cross' : ''}">${r(c.weight)}</span>
        </div>
      `).join('')}
      ${recvList.length === 0 ? '<div style="color:#787c83;padding:4px 8px;">None in view</div>' : ''}
    </div>
  `;

  document.body.classList.add('sidebar-open');

  // Highlight this person's neighborhood
  cy.elements().removeClass('highlighted dimmed');
  const neighborhood = node.closedNeighborhood();
  cy.elements().not(neighborhood).addClass('dimmed');
  neighborhood.addClass('highlighted');
}

function showGhostSidebar(node) {
  const d = node.data();
  const sb = document.getElementById('sidebar');
  sb.innerHTML = `
    <span class="close" onclick="closeSidebar()">&times;</span>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px;">
      <img src="${d.avatar || ghostAvatar(d.pid)}" style="width:56px;height:56px;border-radius:50%;border:3px dashed #DB001D;background:#f2f4f7;object-fit:cover;opacity:0.5;" />
      <div>
        <h2 style="margin-bottom:2px;color:#5E636B;">${d.fullName || d.label}</h2>
        <div style="font-size:11px;color:#787c83;">${d.jobTitle || 'N/A'}</div>
      </div>
    </div>
    <hr>
    <div style="background:#FFEBF0;border:1px solid #DB001D;border-radius:8px;padding:16px;margin:12px 0;border-opacity:0.3;">
      <div style="font-weight:600;color:#DB001D;margin-bottom:8px;">Disengaged</div>
      <div style="font-size:12px;color:#41454D;line-height:1.6;">
        This person is a member of the selected group but has <strong style="color:#DB001D;">zero recognition activity</strong> in the last ${DATA.meta.days} days.
        <br><br>
        No wambis sent or received. Not visible in the culture network.
      </div>
    </div>
    <div class="row"><span class="lbl">People ID</span><span class="val">${d.pid}</span></div>
  `;
  document.body.classList.add('sidebar-open');
}

function closeSidebar() {
  document.body.classList.remove('sidebar-open');
  cy.elements().removeClass('highlighted dimmed');
}

function focusNode(nodeId) {
  const node = cy.getElementById(nodeId);
  if (!node || node.length === 0) return;
  cy.animate({ center: { eles: node }, zoom: 2 }, { duration: 400 });
  setTimeout(() => showSidebar(node), 420);
}

// (old highlight/filter functions removed - replaced by group scoping above)

function reLayout() {
  cy.layout({ ...layoutOpts, randomize: false }).run();
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeSidebar(); document.getElementById('gt-select').value = 'all'; onGroupTypeChange('all'); }
  if (e.key === 'r') reLayout();
  if (e.key === 'h') document.body.classList.toggle('chrome-hidden');
});
</script>
</body>
</html>
